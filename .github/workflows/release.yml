name: Publish release to crates.io
on:
  release:
    types: [ published ]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: rustup toolchain install stable --no-self-update --profile minimal --target thumbv7em-none-eabihf
    - run: cargo publish --package=imxrt-rt --target=thumbv7em-none-eabihf --target=x86_64-unknown-linux-gnu
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
